name: Embed Gesetze

on:
  workflow_dispatch:

jobs:
  embed:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install qdrant-client fastembed lxml

      - name: Unzip Gesetze
        run: |
          mkdir -p xml
          unzip Gesetze.zip -d xml

      - name: Run embedding
        env:
          QDRANT_URL: ${{ secrets.QDRANT_URL }}
          QDRANT_API_KEY: ${{ secrets.QDRANT_API_KEY }}
        run: |
          python embed.py
